name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege at the workflow level; widen per-job only where needed. 2026 GitHub Actions
# hardening recommendation (StepSecurity / Well-Architected). See PYTHON_HARDENING_PLAN.md WS8.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv (pinned Python 3.11)
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.11"

      - name: Install deps (dev extra)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy --strict, scoped)
        run: uv run mypy src

      - name: Type check (pyright, standard)
        run: uv run pyright src api

      - name: Architecture (import-linter)
        run: uv run lint-imports

      - name: Tests (pytest, DB-free) + coverage XML
        run: uv run pytest --cov=de_playground --cov-report=xml --cov-report=term

      - name: Diff coverage gate (>=80% of changed lines vs main)
        # Total coverage is reported in the step above (visibility); the *gate* is on the
        # patch: each PR must cover >=80% of its own new/changed lines. See WS6 in
        # docs/PYTHON_HARDENING_PLAN.md — vanity total thresholds would be coverage theater
        # given the Spark suite can't run in default CI.
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          uv run --with diff-cover diff-cover coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=80

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.11"

      - name: pip-audit (known-CVE deps; full workspace incl. api/)
        # Audit the LOCKED third-party deps, not the installed environment. `uv export
        # --no-emit-workspace` drops the two local projects (de-playground, de-playground-api)
        # — auditing the env directly fails because pip-audit can't look up editable local
        # packages on PyPI, and `--strict` turns that skip into a hard error. `--all-extras
        # --all-packages` keeps the api/ member's deps (elasticsearch, fastapi, otel) in scope.
        # `--no-deps --disable-pip` makes pip-audit check the already-pinned set against the
        # vuln DB WITHOUT re-resolving/installing (which can fail on platform/python mismatch).
        # When an unfixable CVE hits a pinned EOL dep (Spark 3.5, ES 8.14 — BACKLOG P1), add it
        # to `--ignore-vuln <ID>` WITH a one-line rationale so the gate stays trustworthy.
        run: |
          uv export --frozen --all-extras --all-packages --no-emit-workspace \
            --no-hashes -o requirements-audit.txt
          uv tool run pip-audit --strict --no-deps --disable-pip -r requirements-audit.txt
        # Example for the future (uv tool run == uvx; use the long form — `uvx` isn't always on PATH):
        # uv tool run pip-audit --strict --no-deps --disable-pip -r requirements-audit.txt \
        #   --ignore-vuln GHSA-xxxx-yyyy-zzzz  # py4j: unfixable; tracked in Spark 4 upgrade (BACKLOG P1)

      - name: gitleaks (secrets scan; .env.example placeholders allowlisted)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Markdown link check (lychee)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --no-progress --verbose './**/*.md'
          fail: true

  pyspark:
    # Opt-in: runs the @pytest.mark.pyspark tests (Spark transforms) on a job that ships
    # a JDK. Default `quality` job is Java-free; this one keeps PySpark verification
    # honest without dragging Spark setup into every CI run.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install JDK 17 (Spark 3.5 supports Java 8/11/17 only)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.11"

      - name: Install all extras (need pyspark + dev)
        run: uv sync --all-extras --all-packages

      - name: Tests (pyspark marker, opt-in)
        run: uv run pytest -m pyspark
