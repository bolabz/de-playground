# Pre-commit hooks — catch issues before they're committed. Install once with:
#   uv run pre-commit install
# Run on all files:  uv run pre-commit run --all-files
# Pinned revs; bump with `pre-commit autoupdate`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff          # lint (with autofix)
        args: [--fix]
      - id: ruff-format   # format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files   # block accidental commits of .bak / wheels
        args: [--maxkb=2048]
      - id: check-merge-conflict

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks                  # secrets scan; config in .gitleaks.toml
