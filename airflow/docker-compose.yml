# Airflow control plane (LocalExecutor) — joins the main stack's `de` network so DAG tasks
# reach sqlserver / seaweedfs / elasticsearch by service name.
#
# Run AFTER the main stack is up (the `de` network must exist):
#   make up-serve          # creates the de-playground_de network + the services to orchestrate
#   make up-airflow        # build + start Airflow; UI at http://localhost:8081 (admin / admin)
#
# The external network name is "<project>_de" = "de-playground_de" (project = repo folder name).
# If yours differs, find it with `docker network ls` and update the name below.

x-airflow-common: &airflow-common
  build: .          # context = this airflow/ dir (where the Dockerfile lives)
  image: de-playground-airflow:local
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    # ---- pipeline config: service names on the de network, least-privilege creds ----
    MSSQL_HOST: sqlserver
    MSSQL_DB: WideWorldImporters
    MSSQL_APP_USER: de_extract                                  # least-privilege login
    MSSQL_APP_PASSWORD: "${MSSQL_APP_PASSWORD:-Change_me_app_passw0rd}"
    S3_ENDPOINT_URL: http://seaweedfs:8333
    S3_ACCESS_KEY: appaccesskey                                 # app identity (no Admin)
    S3_SECRET_KEY: appsecretkey
    ES_URL: http://elasticsearch:9200
    # ---- OpenTelemetry metrics (optional) ----
    # Airflow 2.x can emit task/scheduler metrics over OTLP to the collector. Requires the
    # otel exporter in the image (`pip install opentelemetry-exporter-otlp` in airflow/Dockerfile)
    # and the observability profile running. Uncomment to enable:
    # AIRFLOW__METRICS__OTEL_ON: "True"
    # AIRFLOW__METRICS__OTEL_HOST: otel-collector
    # AIRFLOW__METRICS__OTEL_PORT: "4318"
    # AIRFLOW__METRICS__OTEL_INTERVAL_MILLISECONDS: "30000"
  volumes:
    # paths are relative to this airflow/ dir, so the repo root is one level up (../)
    - ../dags:/opt/airflow/dags
    - ../src:/opt/de_playground/src:ro      # pipeline source, imported via PYTHONPATH in the DAG
    - airflow-logs:/opt/airflow/logs
  networks: [de]

networks:
  de:
    external: true
    name: de-playground_de

volumes:
  airflow-postgres-data:
  airflow-logs:

services:
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes: ["airflow-postgres-data:/var/lib/postgresql/data"]
    networks: [de]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: migrate the metadata DB and create the admin user.
  airflow-init:
    <<: *airflow-common
    depends_on:
      airflow-postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname admin --lastname admin --role Admin --email admin@example.com || true
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports: ["8081:8080"]    # 8080 is taken by the Spark master UI on the host
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    restart: unless-stopped
