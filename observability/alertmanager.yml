# Alertmanager routing. The default receiver just holds alerts (visible in the Alertmanager UI
# at :9093). To actually notify, fill in the Slack webhook below (or add an email/PagerDuty
# receiver) — this is the local stand-in for Azure Monitor action groups.
route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: default
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"
    #     channel: "#de-alerts"
    #     send_resolved: true
