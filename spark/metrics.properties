# Expose Spark metrics in Prometheus format via the built-in PrometheusServlet sink (Spark 3.0+).
# Each instance (master/worker/driver) serves at <its UI>/metrics/prometheus; Prometheus scrapes
# the master at spark-master:8080/metrics/prometheus.
*.sink.prometheusServlet.class=org.apache.spark.metrics.sink.PrometheusServlet
*.sink.prometheusServlet.path=/metrics/prometheus
*.source.jvm.class=org.apache.spark.metrics.source.JvmSource
